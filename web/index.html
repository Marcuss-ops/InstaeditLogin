<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32" />
    <!-- Legacy / pre-parse fallback: a real subset of clients (older headless
         browsers, crawlers, social previews) probes /favicon.ico explicitly
         before parsing <link rel="icon"> declarations. Shipping the actual
         ICO file under public/ kills the spurious 404 in console without
         changing anything for the modern browsers that already use the SVG
         above. -->
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Primary Meta Tags -->
    <meta name="description" content="Earn $2,000+/mo from YouTube on autopilot — zero experience, zero camera, zero editing. AI-powered channel automation and 1-on-1 mentoring. Get your first payout in 14 days." />
    <meta name="keywords" content="YouTube automation, passive income, YouTube monetization, AI video creation, earn money online, YouTube channel, automated income" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="InstaEdit, Inc." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://app.instaedit.org/" />
    <meta property="og:title" content="InstaEdit — Your First $2,000/Mo From YouTube, On Autopilot" />
    <meta property="og:description" content="Earn $2,000+/mo from YouTube on autopilot — zero experience, zero camera, zero editing. AI-powered channel automation and 1-on-1 mentoring." />
    <meta property="og:image" content="https://app.instaedit.org/app-icon-1024.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:url" content="https://app.instaedit.org/" />
    <meta name="twitter:title" content="InstaEdit — Your First $2,000/Mo From YouTube, On Autopilot" />
    <meta name="twitter:description" content="Earn $2,000+/mo from YouTube on autopilot — zero experience, zero camera, zero editing. AI-powered channel automation and 1-on-1 mentoring." />
    <meta name="twitter:image" content="https://app.instaedit.org/app-icon-1024.png" />

    <link rel="canonical" href="https://app.instaedit.org/" />
    <title>InstaEdit — Your First $2,000/Mo From YouTube, On Autopilot</title>

    <!-- JSON-LD Structured Data. contactPoint / sameAs are
         deliberately omitted — Google rich-results penalises
         schema with placeholder or unreachable contact data, and
         exposing personal / third-party accounts in the wire payload
         is a privacy footgun. Add back with verified org contact info
         (legal entity contact email + official social handles) once
         those are stable. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "InstaEdit",
      "applicationCategory": "Multimedia",
      "operatingSystem": "Web",
      "description": "Earn $2,000+/mo from YouTube on autopilot — zero experience, zero camera, zero editing. AI-powered channel automation and 1-on-1 mentoring.",
      "url": "https://app.instaedit.org/",
      "image": "https://app.instaedit.org/app-icon-1024.png",
      "offers": {
        "@type": "Offer",
        "category": "Software as a Service"
      },
      "author": {
        "@type": "Organization",
        "name": "InstaEdit",
        "url": "https://app.instaedit.org/"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
