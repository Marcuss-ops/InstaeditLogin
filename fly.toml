# fly.toml — InstaEditLogin Fly.io deployment (Blocco #4.1)
#
# ONE Fly app, TWO process groups (api + worker). Both run from the
# SAME image (Dockerfile [production] stage, which bundles
# /app/api + /app/worker + /app/migrate + /migrate). The [processes]
# block below picks the per-process entrypoint binary; the rest of
# the image is shared (same DB conn, same encryption keys, same JWT
# secret, same S3 storage config). Setting `workdir` to `/app` so the
# release_command shorthand "./migrate" lands on /app/migrate.
#
# Always-on (Blocco #4.1 contract): min_machines_running = 1 GUARDS
# against scale-to-zero. The api process keeps low-latency JWT issuing
# + /healthz latency under SLA; the worker process keeps
# publish/reconcile drain steady. Independent health checks below gate
# traffic onto healthy machines during a rolling swap.
#
# Env scoping:
#   - shared (api + worker):          DATABASE_URL, JWT_SECRET,
#                                    ENCRYPTION_KEYS, ACTIVE_ENCRYPTION_KEY_ID,
#                                    S3_*, bucket, region, email,
#                                    OAuth provider creds, stripe webhook
#                                    secret, worker tick intervals.
#   - api-only:                       FRONTEND_URL, CORS_ALLOWED_ORIGINS,
#                                    Stripe publishable keys if any,
#                                    PORT. Worker process ignores these
#                                    silently (cfg.FrontendURL = "" is a
#                                    valid state for the no-HTTP process).
#   - worker-only:                    WORKER_HEALTH_PORT = "9090" (Fly
#                                    [[services.tcp_checks]] target). The
#                                    shared [env] sets it to "0" (off) so
#                                    `fly deploy` never surprises dev
#                                    environments — only the [processes.worker.env]
#                                    block enables it on Fly.
#
# Deploy:
#   flyctl deploy --config fly.toml
#
# NOTE on secrets: this file uses `<redacted>` for secrets intentionally.
# Production deploys MUST set those values via `flyctl secrets set` \
# before/after the first deploy (DATABASE_URL, JWT_SECRET, \
# ENCRYPTION_KEYS, S3_ACCESS_KEY, S3_SECRET_KEY, EMAIL_PROVIDER_KEY, \
# STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET). Setting them via [env] \
# would pin them in version control; Fly's secrets store is the \
# canonical home for sensitive material. Per-process scopes work the
# same way: `flyctl secrets set --process-group worker WORKER_TOKEN=...`.

app = "instaedit-login"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  # Pin to the production stage explicitly so accidental --target
  # overrides don't ship a different image.
  build_target = "production"

[deploy]
  # release_command runs in a fresh ephemeral machine with the SAME
  # image, picking up DATABASE_URL + JWT_SECRET + ENCRYPTION_KEYS
  # from the regular [env] block (Fly inherits into release machines).
  # WORKDIR=/app is set on Dockerfile [production] so `./migrate`
  # resolves to /app/migrate (the binary at that path comes from the
  # `COPY --from=builder /out/migrate /app/migrate` line in the
  # Dockerfile). The contract from the user spec is "./migrate" —
  # NOT "./migrate.sh", the binary has no extension.
  release_command = "./migrate"
  strategy = "rolling"
  # ALWAYS-ON: at least 1 machine per process group alive. No
  # scale-to-zero (the canonical 0.x cost-cutting feature that would
  # violate Blocco #4.1's "no scale-to-zero" rule for api/worker
  # surfaces serving user traffic).
  min_machines_running = 1

[env]
  # Process-agnostic shared config.
  GIN_MODE = "release"
  LOG_LEVEL = "info"
  APP_ENV = "production"

  # Blocco #5.3 — Sentry observability (optional). Commented
  # out by default — operators opt in by running `flyctl secrets
  # set SENTRY_DSN=https://<key>@<host>/<project>` and the
  # values re-attach via Fly's secret propagation on next
  # deploy. The wire code in internal/bootstrap.Wire checks
  # cfg.SentryDSN — empty == no Sentry init; non-empty ==
  # sentrygo.Init runs at startup + panic middleware
  # captures every recovered panic via sentryhttp.New.
  # SENTRY_DSN = "<redacted>"
  # SENTRY_ENVIRONMENT = "production"
  # SENTRY_RELEASE = "<redacted>"

  # Blocco #5.3 — /ready endpoint is mounted at "/ready" (no JWT).
  # Fly's [[services.api]] http_checks above targets
  # /api/v1/health (the cheap liveness probe); /ready is for
  # K8s-style deep-readiness probes that wake the DB. Add a
  # second [[services]] block or a [[services.http_checks]] on
  # the existing one with path = "/ready" when an orchestrator
  # needs the deep signal.

  # DB (managed Postgres on Fly, internal-only via flycast).
  DATABASE_URL = "postgresql://instaedit:<redacted>@<managed-pg-host>.flycast:5432/instaedit_login?sslmode=require"
  DB_SSLMODE = "require"

  # Crypto (Blocco #2.2 multi-key).
  ENCRYPTION_KEYS = "<redacted>"
  ACTIVE_ENCRYPTION_KEY_ID = "1"

  # JWT (worker + api both sign/validate).
  JWT_SECRET = "<redacted>"

  # S3-compatible storage (api mints presigned URLs; worker verifies
  # media_url on candidate publish payloads, so both apps need S3_*).
  S3_ENDPOINT = "https://fly.storage.tigris.dev"
  S3_REGION = "auto"
  S3_BUCKET = "instaedit-media"
  S3_ACCESS_KEY = "<redacted>"
  S3_SECRET_KEY = "<redacted>"

  # Worker cadence (consumed by both apps; api process ignores
  # because it has no workers; worker uses them directly).
  PUBLISH_WORKER_INTERVAL_SECONDS = "30"
  RECONCILE_WORKER_INTERVAL_SECONDS = "5"
  WEBHOOK_WORKER_INTERVAL_SECONDS = "30"
  METRICS_COLLECT_INTERVAL_SECONDS = "60"

  # OAuth provider creds (worker refreshes via the vault; api only
  # uses them at startup). Same template both sides.
  META_APP_ID = "<redacted>"
  META_APP_SECRET = "<redacted>"
  TIKTOK_CLIENT_ID = "<redacted>"
  TIKTOK_CLIENT_SECRET = "<redacted>"
  X_CLIENT_ID = "<redacted>"
  X_CLIENT_SECRET = "<redacted>"
  YOUTUBE_CLIENT_ID = "<redacted>"
  YOUTUBE_CLIENT_SECRET = "<redacted>"
  LINKEDIN_CLIENT_ID = "<redacted>"
  LINKEDIN_CLIENT_SECRET = "<redacted>"

  # Mail transactional provider (Blocco #2.3). Worker reads outbox
  # events and invokes the sender; api reads the same config for
  # ad-hoc transactional templates.
  EMAIL_PROVIDER = "postmark"
  EMAIL_PROVIDER_KEY = "<redacted>"
  EMAIL_FROM = "no-reply@instaedit.org"
  EMAIL_FROM_NAME = "InstaEdit"

  # Stripe — webhook signing secret is verified by the worker; the
  # publishable key + secret are api-only.
  STRIPE_WEBHOOK_SECRET = "<redacted>"

  # Worker health port — shared default is OFF ("0") so dev runs
  # (make run-worker) don't accidentally bind 9090. [processes.worker.env]
  # below sets it to "9090" for the Fly worker process group.
  WORKER_HEALTH_PORT = "0"

# ────────────────────────────────────────────────────────────────────────
# [processes] — process-group entrypoints + per-process env overrides.
# ────────────────────────────────────────────────────────────────────────
[processes]
  api = "/app/api"
  worker = "/app/worker"

[processes.api.env]
  PORT = "8080"
  FRONTEND_URL = "https://app.instaedit.org"
  CORS_ALLOWED_ORIGINS = "https://app.instaedit.org"
  STRIPE_SECRET_KEY = "<redacted>"
  STRIPE_PRICE_ID_PRO = "<redacted>"
  # Rate-limit floors — api only.
  RATE_LIMIT_POSTS_PER_WORKSPACE_PER_MIN = "60"
  RATE_LIMIT_APIKEY_READS_PER_KEY_PER_MIN = "600"
  RATE_LIMIT_MEDIA_PRESIGN_PER_IP_PER_MIN = "30"
  RATE_LIMIT_OAUTH_START_PER_IP_PER_MIN = "30"

[processes.worker.env]
  # Opt the worker process group into the Fly tcp_checks target. The
  # [env] default "0" keeps dev (make run-worker) from binding 9090.
  WORKER_HEALTH_PORT = "9090"

# ────────────────────────────────────────────────────────────────────────
# [[services.api]] — public HTTP service for the api process group.
# internal_port 8080 binds /app/api; ports 80/443 are public. http_checks
# on /api/v1/health (pkg/api/handlers.go::handleHealth returns 200 OK +
# JSON envelope listing current platforms). grace_period 10s gives the
# api cold start to load config + connect DB before traffic lands.
# ────────────────────────────────────────────────────────────────────────
[[services]]
  processes = ["api"]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    path = "/api/v1/health"
    interval = "15s"
    timeout = "3s"
    grace_period = "10s"
    method = "GET"
    protocol = "http"

  [services.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

# ────────────────────────────────────────────────────────────────────────
# [[services.worker]] — non-public TCP service for the worker process
# group. internal_port 9090 binds cmd/worker's WORKER_HEALTH_PORT TCP
# accept-and-close listener (see cmd/worker/health_listener.go). No
# [[services.ports]] declared, so 9090 stays on the Fly private network
# — no public reachability.
# ────────────────────────────────────────────────────────────────────────
[[services]]
  processes = ["worker"]
  protocol = "tcp"
  internal_port = 9090

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "3s"
    grace_period = "15s"

# ────────────────────────────────────────────────────────────────────────
# [[services.migrate]] — sentinel service for the release-command container.
# Fly runs release_command in a dedicated fresh machine with the SAME
# image; declaring a minimal service here means Fly can route its
# /api/v1/health probe during release and surface a clean "release
# failed" line in the dashboard if /migrate exits non-zero during the
# apply. internal_port 8080 is fine because cmd/migrate never binds it
# so http_checks here gracefully fail-fast — the release DOES NOT need
# the http_checks to succeed, only ./migrate to exit 0; we leave this
# commented as documentation.
# ────────────────────────────────────────────────────────────────────────
# [[services]]
#   processes = ["release"]
#   protocol = "tcp"
#   internal_port = 8080
#   [[services.http_checks]]
#     path = "/api/v1/health"
#     interval = "15s"
#     timeout = "3s"
#     grace_period = "10s"

# ────────────────────────────────────────────────────────────────────────
# [[metrics]] — Prometheus scrape of the api process's /api/v1/metrics
# endpoint. Worker's pkg/metrics increments live in the worker's
# separate process registry (separate Fly app VM, separate reaper), so
# they are NOT exposed here. Cross-process aggregation of worker
# metrics is a deferred Blocco (out of scope for #4.1).
# ────────────────────────────────────────────────────────────────────────
[[metrics]]
  port = 8080
  path = "/api/v1/metrics"

# ────────────────────────────────────────────────────────────────────────
# [[vm]] — process-group machine shapes.
#
# min_machines_running at the [deploy] level gates the WHOLE app at
# >=1 machine always alive. Per-process scale-up applies to whichever
# process group needs more machines; for now both groups are 1x/512MB
# shared-cpu and will scale together under Fly's default rules.
#
# auto_stop_machines = false is the explicit "no scale to zero" lever
# (overrides any default auto-stop behaviour). auto_start_machines =
# true means cold-starting machines from zero would respawn after a
# crash — defensive against the auto_stop=false contract.
# ────────────────────────────────────────────────────────────────────────
[[vm]]
  processes = ["api", "worker"]
  size = "shared-cpu-1x"
  memory = "512mb"
  auto_stop_machines = false
  auto_start_machines = true
