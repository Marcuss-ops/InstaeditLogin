# fly.toml — InstaEditLogin Fly.io deployment (Blocco #4.1)
#
# ONE Fly app, TWO process groups (api + worker). Both run from the
# SAME image (Dockerfile [production] stage, which bundles
# /app/api + /app/worker + /app/migrate + /migrate). The [processes]
# block below picks the per-process entrypoint binary; the rest of the
# image is shared (same DB conn, same encryption keys, same JWT
# secret, same S3 storage config).
#
# Always-on (Blocco #4.1 contract): min_machines_running = 1 GUARDS
# against scale-to-zero. The api process keeps low-latency JWT issuing
# + /healthz latency under SLA; the worker process keeps
# publish/reconcile drain steady. Independent health checks below gate
# traffic onto healthy machines during a rolling swap.
#
# ────────────────────────────────────────────────────────────────────────
# Secrets policy (Blocco #4.1)
# ────────────────────────────────────────────────────────────────────────
# This file is committed. Anything sensitive MUST be set via
# `flyctl secrets set` — never inlined in [env] (which is committed
# to git). The canonical beta command lives in docs/DEPLOY.md and
# covers:
#
#   - DB:           DATABASE_URL (managed Postgres on Fly, internal
#                   flycast, sslmode=require baked into the URL).
#   - Crypto:       ENCRYPTION_KEYS (format "id:base64key[,id:base64key]")
#                   + JWT_SECRET.
#   - S3:           S3_ACCESS_KEY, S3_SECRET_KEY. S3_ENDPOINT,
#                   S3_REGION, S3_BUCKET are public and live in [env]
#                   below.
#   - Mail:         EMAIL_PROVIDER_KEY. EMAIL_PROVIDER, EMAIL_FROM,
#                   EMAIL_FROM_NAME are public and live in [env].
#   - Providers:    META_APP_ID, META_APP_SECRET (covers Instagram,
#                   Facebook, Threads via Meta Graph). The
#                   *_REDIRECT_URI URLs are public (pinned by the
#                   provider console on registration) and live in
#                   [env].
#   - Frontend:     FRONTEND_URL, CORS_ALLOWED_ORIGINS, COOKIE_DOMAIN
#                   (set to ".instaedit.org" so the csrf_token cookie
#                   is shared across app/api subdomains per Blocco
#                   #2.4 cross-subdomain match).
#   - Observability (opt-in, Blocco #5.3): SENTRY_DSN,
#                   SENTRY_ENVIRONMENT, SENTRY_RELEASE. Empty == no
#                   Sentry init; non-empty == sentrygo.Init runs at
#                   startup + panic middleware captures every
#                   recovered panic via sentryhttp.New. The empty
#                   default keeps dev/local runs quiet.
#
# Per-process secrets work the same way (replace FOO with any real
# per-process env name; the codebase currently has no per-process
# secrets, so this is illustrative only):
#   flyctl secrets set --process-group worker FOO=bar
#
# Note for third-party TOML validators (CI gates, etc.): this file
# uses a Fly-specific extension where [processes] declares string
# entrypoints (api = "/app/api", worker = "/app/worker") AND
# [processes.api.env] / [processes.worker.env] declare per-process
# env sub-tables in the same hierarchy. Standard strict TOML parsers
# (e.g. Python tomllib) flag this as "Cannot overwrite a value"
# because the path [processes][api] is a string in one place and
# the prefix of a sub-table in another. flyctl parses this correctly;
# trust flyctl over strict parsers for the Fly-specific shape.
#
# Disabled providers — TikTok, X (Twitter), YouTube, LinkedIn, and
# Stripe — are not configured in beta. Their *_CLIENT_ID /
# *_CLIENT_SECRET / *_REDIRECT_URI / STRIPE_* env keys are removed
# entirely from this file; re-add them when the corresponding
# provider is enabled (the in-app capabilities / provider-registry
# also gates them off, so a stale value can't accidentally re-enable
# a disabled flow).
#
# Deploy:
#   flyctl deploy --config fly.toml

app = "instaedit-login"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  # Pin to the production stage explicitly so accidental --target
  # overrides don't ship a different image.
  build_target = "production"

[deploy]
  # release_command runs in a fresh ephemeral machine with the SAME
  # image, picking up DATABASE_URL + JWT_SECRET + ENCRYPTION_KEYS
  # via Fly's secret propagation into release machines. WORKDIR=/app
  # is set on Dockerfile [production] so `./migrate` resolves to
  # /app/migrate. The contract from the spec is "./migrate" — NOT
  # "./migrate.sh"; the binary has no extension.
  release_command = "./migrate"
  strategy = "rolling"
  # ALWAYS-ON: at least 1 machine per process group alive. No
  # scale-to-zero (the canonical 0.x cost-cutting feature that would
  # violate Blocco #4.1's "no scale-to-zero" rule for api/worker
  # surfaces serving user traffic).
  min_machines_running = 1

[env]
  # Process-agnostic shared non-sensitive config.
  GIN_MODE = "release"
  LOG_LEVEL = "info"
  APP_ENV = "production"

  # S3-compatible storage. The endpoint / region / bucket are public
  # (Tigris is a public service). The access / secret keys are set
  # via flyctl secrets set (S3_ACCESS_KEY, S3_SECRET_KEY).
  S3_ENDPOINT = "https://fly.storage.tigris.dev"
  S3_REGION = "auto"
  S3_BUCKET = "instaedit-media"

  # Mail transactional provider (Blocco #2.3). Provider name + From
  # address are public; the actual API key (EMAIL_PROVIDER_KEY) is
  # set via flyctl secrets set. Worker reads outbox events and
  # invokes the sender; api reads the same config for ad-hoc
  # transactional templates.
  EMAIL_PROVIDER = "resend"
  EMAIL_FROM = "no-reply@instaedit.org"
  EMAIL_FROM_NAME = "InstaEdit"

  # Active encryption key id (the actual key bytes come from the
  # ENCRYPTION_KEYS secret, set via flyctl secrets set). The id is
  # just an index, not a credential — safe to keep in [env].
  ACTIVE_ENCRYPTION_KEY_ID = "1"

  # Worker cadence (consumed by both apps; api process ignores
  # because it has no workers; worker uses them directly). Tunable
  # per environment but not a secret.
  PUBLISH_WORKER_INTERVAL_SECONDS = "30"
  RECONCILE_WORKER_INTERVAL_SECONDS = "5"
  WEBHOOK_WORKER_INTERVAL_SECONDS = "30"
  METRICS_COLLECT_INTERVAL_SECONDS = "60"

  # Rate-limit floors (api only; the worker process ignores these).
  # Tunable per environment but not a secret.
  RATE_LIMIT_POSTS_PER_WORKSPACE_PER_MIN = "60"
  RATE_LIMIT_APIKEY_READS_PER_KEY_PER_MIN = "600"
  RATE_LIMIT_MEDIA_PRESIGN_PER_IP_PER_MIN = "30"
  RATE_LIMIT_OAUTH_START_PER_IP_PER_MIN = "30"

  # OAuth redirect URIs (public, registered in each provider's
  # developer console). These are NOT secrets — they're pinned by
  # the provider console on registration. They live in [env] so
  # the same value is shared between api and worker without going
  # through the secrets store.
  INSTAGRAM_REDIRECT_URI = "https://api.instaedit.org/api/v1/auth/instagram/callback"
  FACEBOOK_REDIRECT_URI = "https://api.instaedit.org/api/v1/auth/facebook/callback"
  THREADS_REDIRECT_URI = "https://api.instaedit.org/api/v1/auth/threads/callback"

  # Worker health port — shared default is OFF ("0") so dev runs
  # (make run-worker) don't accidentally bind 9090. [processes.worker.env]
  # below sets it to "9090" for the Fly worker process group.
  WORKER_HEALTH_PORT = "0"

# ────────────────────────────────────────────────────────────────────────
# [processes] — process-group entrypoints + per-process env overrides.
# ────────────────────────────────────────────────────────────────────────
[processes]
  api = "/app/api"
  worker = "/app/worker"

[processes.api.env]
  PORT = "8080"

[processes.worker.env]
  # Opt the worker process group into the Fly tcp_checks target. The
  # [env] default "0" keeps dev (make run-worker) from binding 9090.
  WORKER_HEALTH_PORT = "9090"

# ────────────────────────────────────────────────────────────────────────
# [[services.api]] — public HTTP service for the api process group.
# internal_port 8080 binds /app/api; ports 80/443 are public. http_checks
# on /api/v1/health (pkg/api/handlers.go::handleHealth returns 200 OK +
# JSON envelope listing current platforms). grace_period 10s gives the
# api cold start to load config + connect DB before traffic lands.
# ────────────────────────────────────────────────────────────────────────
[[services]]
  processes = ["api"]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    path = "/api/v1/health"
    interval = "15s"
    timeout = "3s"
    grace_period = "10s"
    method = "GET"
    protocol = "http"

  [services.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

# ────────────────────────────────────────────────────────────────────────
# [[services.worker]] — non-public TCP service for the worker process
# group. internal_port 9090 binds cmd/worker's WORKER_HEALTH_PORT TCP
# accept-and-close listener (see cmd/worker/health_listener.go). No
# [[services.ports]] declared, so 9090 stays on the Fly private network
# — no public reachability.
# ────────────────────────────────────────────────────────────────────────
[[services]]
  processes = ["worker"]
  protocol = "tcp"
  internal_port = 9090

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "3s"
    grace_period = "15s"

# ────────────────────────────────────────────────────────────────────────
# [[services.migrate]] — sentinel service for the release-command
# container. Fly runs release_command in a dedicated fresh machine
# with the SAME image; declaring a minimal service here means Fly
# can route its /api/v1/health probe during release. cmd/migrate
# never binds a port so http_checks here gracefully fail-fast — the
# release DOES NOT need the http_checks to succeed, only ./migrate
# to exit 0; we leave this commented as documentation.
# ────────────────────────────────────────────────────────────────────────
# [[services]]
#   processes = ["release"]
#   protocol = "tcp"
#   internal_port = 8080
#   [[services.http_checks]]
#     path = "/api/v1/health"
#     interval = "15s"
#     timeout = "3s"
#     grace_period = "10s"

# ────────────────────────────────────────────────────────────────────────
# [[metrics]] — Prometheus scrape of the api process's /api/v1/metrics
# endpoint. Worker's pkg/metrics increments live in the worker's
# separate process registry (separate Fly app VM, separate reaper), so
# they are NOT exposed here. Cross-process aggregation of worker
# metrics is a deferred Blocco (out of scope for #4.1).
# ────────────────────────────────────────────────────────────────────────
[[metrics]]
  port = 8080
  path = "/api/v1/metrics"

# ────────────────────────────────────────────────────────────────────────
# [[vm]] — process-group machine shapes.
#
# min_machines_running at the [deploy] level gates the WHOLE app at
# >=1 machine always alive. Per-process scale-up applies to whichever
# process group needs more machines; for now both groups are 1x/512MB
# shared-cpu and will scale together under Fly's default rules.
#
# auto_stop_machines = false is the explicit "no scale to zero" lever
# (overrides any default auto-stop behaviour). auto_start_machines =
# true means cold-starting machines from zero would respawn after a
# crash — defensive against the auto_stop=false contract.
# ────────────────────────────────────────────────────────────────────────
[[vm]]
  processes = ["api", "worker"]
  size = "shared-cpu-1x"
  memory = "512mb"
  auto_stop_machines = false
  auto_start_machines = true
