# InstaEditLogin — local-only overlay for dev without Fly/Vercel/Cloudflare.
#
# Loaded as `-f docker-compose.local.yml` on top of `docker-compose.yml`.
#
# IMPORTANT — Compose merge semantics caveat:
#   Defining `services.minio:` here REPLACES (not merges into) the base
#   file's full minio service map. So we MUST redeclare every field the
#   base minio defines (image, healthcheck, env, volumes) — otherwise the
#   base's `healthcheck` is lost and `minio-init`'s `depends_on:
#   { minio: { condition: service_healthy } }` will never satisfy, which
#   in turn blocks the api service from ever starting. The base image
#   tag is pinned to a known-good MinIO release; keep this overlay in
#   lock-step when bumping the base.
#
# Local-only quirk carried here: 127.0.0.1:19000 host binding for VMs
# where host :9000 is occupied by a leftover listener. The api container
# still reaches MinIO over the docker network at http://minio:9000
# (compose service DNS) regardless of this host mapping.
#
# PASSWORDS MUST MATCH: MINIO_ROOT_PASSWORD below is the SAME string as
# S3_SECRET_KEY in `.env.dev`. If you rotate one without the other, the
# api silently fails auth on the first S3 PUT/GET. Operators can verify
# with:
#   grep '^S3_SECRET_KEY=' .env.dev | cut -d= -f2-
#   grep '^MINIO_ROOT_PASSWORD:' docker-compose.local.yml

services:
  minio:
    image: minio/minio:RELEASE.2024-09-13T16-55-53Z
    container_name: instaedit-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: instaedit
      MINIO_ROOT_PASSWORD: change-this-local-secret
    volumes:
      - instaedit_minio_data:/data
    # Compose-merge requires healthcheck to be redeclared here so
    # `condition: service_healthy` is satisfiable in the merged config.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:19000:9000"

volumes:
  instaedit_minio_data:
