# InstaEditLogin — local-only overlay for dev without Fly/Vercel/Cloudflare.
#
# Loaded as `-f docker-compose.local.yml` on top of `docker-compose.yml`.
#
# IMPORTANT — Compose merge semantics caveat:
#   Defining `services.minio:` here REPLACES (not merges into) the base
#   file's full minio service map. So we MUST redeclare every field the
#   base minio defines (image, healthcheck, env, volumes) — otherwise the
#   base's `healthcheck` is lost and `minio-init`'s `depends_on:
#   { minio: { condition: service_healthy } }` will never satisfy, which
#   in turn blocks the api service from ever starting. The base image
#   tag is pinned to a known-good MinIO release; keep this overlay in
#   lock-step when bumping the base.
#
# Local-only quirk carried here: 127.0.0.1:19000 host binding for VMs
# where host :9000 is occupied by a leftover listener. The api container
# still reaches MinIO over the docker network at http://minio:9000
# (compose service DNS) regardless of this host mapping.
#
# PASSWORDS MUST MATCH: MINIO_ROOT_PASSWORD below is the SAME string as
# S3_SECRET_KEY in `.env.dev`. If you rotate one without the other, the
# api silently fails auth on the first S3 PUT/GET. Operators can verify
# with:
#   grep '^S3_SECRET_KEY=' .env.dev | cut -d= -f2-
#   grep '^MINIO_ROOT_PASSWORD:' docker-compose.local.yml

services:
  minio:
    # Pinned to a stable tag when possible, but MinIO prunes older
    # RELEASE tags from Docker Hub. `latest` is used here for local
    # dev resilience; update to a specific release tag when one is
    # reliably available in your registry mirror.
    image: minio/minio:latest
    container_name: instaedit-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: instaedit
      MINIO_ROOT_PASSWORD: change-this-local-secret
    volumes:
      - instaedit_minio_data:/data
    # Compose-merge requires healthcheck to be redeclared here so
    # `condition: service_healthy` is satisfiable in the merged config.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:19000:9000"
    # Re-declared alongside the base file's [default, media-backend]
    # so the host-port override at 127.0.0.1:19000 keeps working AND
    # the container still has a presence on the Velox internal bridge
    # (handy for staging buckets to bridge velox → instaedit in
    # local-only end-to-end testing).
    networks:
      - default
      - media-backend

  # Local-only velox-master override — by default this overlay does
  # NOT start velox-master (the operator manually runs it via
  # `docker compose --profile velox up`), but the explicit profile
  # marker keeps the local-only 127.0.0.1 host binding behaviour
  # even after the eventual upstream image lands in a registry.
  # UNCOMMENT to enable the local Phase 1 pipeline.
  #
  #  velox-master:
  #    image: ghcr.io/velox/master:dev
  #    container_name: instaedit-velox
  #    networks:
  #      - media-backend
  #    profiles: ["velox"]

# Velox internal bridge — redeclared for self-containment so the
# overlay runs correctly when invoked as `docker compose -f
# docker-compose.local.yml up` (without the base file the network
# reference above would fail). `internal: true` disables the
# default gateway for any container on this bridge; the same
# hardening rationale as in docker-compose.yml applies.
#
# IMPORTANT: under the merged shape (`-f docker-compose.yml
# -f docker-compose.local.yml`) Compose's network-map merge is
# REPLACE-at-the-named-network level — the overlay's entire
# value-object for `media-backend` replaces the base's. If this
# overlay ever flips `internal` to `false`, the overlay WINS and the
# Velox handoff bridge is silently downgraded (containers regain
# Internet egress). Always keep `internal: true` here unless you
# also add a host-firewall compensating control (iptables rules on
# the bridge, ufw policies, etc.).
networks:
  media-backend:
    internal: true

volumes:
  instaedit_minio_data:
