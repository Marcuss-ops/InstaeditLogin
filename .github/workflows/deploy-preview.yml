# .github/workflows/deploy-preview.yml — InstaEditLogin Vercel preview deploy
#
# Deploys the web bundle to a Vercel *preview* URL on demand.
# Unlike deploy.yml (production on every push to main), this workflow
# is meant for temporary previews, e.g. to share the demo mode build
# before the backend is deployed.
#
# Required GitHub repo secrets (same as deploy.yml):
#   VERCEL_TOKEN
#   VERCEL_ORG_ID
#   VERCEL_PROJECT_ID
#
# The preview build enables demo mode (VITE_DEMO_MODE=true) so the SPA
# runs against the static fixtures in web/src/lib/demo.ts instead of
# the Go backend. VITE_API_BASE_URL is set to a placeholder because the
# validator is skipped when demo mode is active.

name: deploy-preview

"on":
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "VITE_API_BASE_URL for the preview build"
        required: false
        default: "https://api.instaedit.org"

permissions:
  contents: read

concurrency:
  group: deploy-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vercel-preview:
    name: Deploy web/app to Vercel (preview)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build with demo mode
        working-directory: web
        env:
          VITE_DEMO_MODE: "true"
          VITE_API_BASE_URL: ${{ github.event.inputs.api_base_url || 'https://api.instaedit.org' }}
        # Pinned Vercel CLI version (keep in sync with deploy.yml).
        run: npx vercel@39.2.0 build

      - name: Deploy to Vercel (preview)
        working-directory: web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        # Pinned Vercel CLI version (keep in sync with deploy.yml).
        run: |
          DEPLOY_URL=$(npx vercel@39.2.0 deploy --prebuilt --yes)
          echo "PREVIEW_URL=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $DEPLOY_URL"
