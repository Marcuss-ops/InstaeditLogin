# .github/workflows/deploy.yml — InstaEditLogin Vercel deploy
#
# Independent from .github/workflows/integration.yml (which is CI-only —
# gofmt / vet / race-test / vitest / vite build) and is responsible for
# shipping the web bundle to Vercel production.
#
# Why a dedicated deploy workflow instead of relying on the
# Vercel-for-Git integration:
# Vercel's git-app sometimes silently stops triggering deploys on push
# (we observed this in production — multiple pushes arrived on `main`,
# `git log` showed them, but Vercel's edge cache never invalidated).
# Running `npx vercel deploy --prod` from a workflow runner we control
# makes the deploy loop durable: the next push WILL produce a deploy,
# the build artifact WILL be re-uploaded, the CDN WILL refresh.
#
# Why we DO listen to `push` on main (deploys straight to production):
# To avoid deploy paralysis when CI is flaky (Docker pull rate-limit,
# testcontainers timeouts, Go race flakes), this workflow deploys on
# EVERY push to `main` without waiting for CI. CI still runs in
# parallel (`integration.yml` is a separate workflow) and serves as
# an audit signal — its conclusion is reported back but does NOT
# gate the deploy.
#
# SAFETY: this emergency-lane model is ONLY safe when the following
# GitHub repo settings are enabled (Settings → Branches → Branch
# protection rules → main):
#   \u2610  Require signed commits
#   \u2610  Require pull request reviews before merging (\u22651 approval)
#   \u2610  Restrict who can push to matching branches
# If any of these are OFF, a single push can ship unverified code
# directly to production. Verify before relying on this lane, or
# revert to workflow_run gated on CI success.
#
# Why NOT Vercel-for-Git: the Git-app installation sometimes silently
# stops triggering deploys on push (observed in production \u2014 git log
# showed push landed, Vercel CDN never refreshed). Running `npx vercel
# deploy --prod` from a workflow runner we control makes the loop
# durable.
#
# Required GitHub repo secrets (Settings → Secrets and variables →
# Actions → New repository secret). FAIL-FAST if any is missing:
#   VERCEL_TOKEN     vercel.com/account/tokens → Create Token (Full Account)
#   VERCEL_ORG_ID    /v2/teams \u2192 id of team owning the project (or /v2/user for personal account)
#   VERCEL_PROJECT_ID /v9/projects \u2192 id of the InstaEdit project
#
# Required GitHub repository secrets (Settings → Secrets and variables →
# Actions → New repository secret). Every variable MUST be set BEFORE
# the first push hits this workflow, otherwise the action fails fast:
#
#   VERCEL_TOKEN       https://vercel.com/account/tokens → "Create Token".
#                       Pick scope "Full Account" so the token can resolve
#                       which project/org it belongs to without needing
#                       additional context. Expiry: leave at default 24h
#                       (token is auto-issued per-deploy, low blast radius
#                       if leaked).
#
#   VERCEL_ORG_ID      Visible in the response of:
#                         curl -H "Authorization: Bearer $VERCEL_TOKEN" \
#                              https://api.vercel.com/v2/teams
#                       The `id` field on the team entry that owns the
#                       project. If the project belongs to a personal
#                       account (no team), use the personal-account `id`
#                       returned by `/v2/user`.
#
#   VERCEL_PROJECT_ID  Visible in:
#                         curl -H "Authorization: Bearer $VERCEL_TOKEN" \
#                              https://api.vercel.com/v9/projects
#                       The `id` of the InstaEdit project. Persisted
#                       after the first successful Vercel-for-Git deploy
#                       even if that integration is now broken — copy
#                       from the Vercel dashboard → Project Settings
#                       → General → "Project ID".
#
# ⚠️ DEPLOY-DUPLICATION NOTE:
# If the Vercel-for-Git integration is STILL partially active in
# vercel.com/dashboard (Settings → Git → Connected Git Repository),
# it may ALSO deploy on every push. That would create a duplicate
# deploy per commit. Mitigation: disconnect the GitHub repo from the
# Vercel dashboard once this workflow is verified to work — both paths
# point at the same Vercel project so duplicates are safe but wasteful.

name: deploy

# Minimum-needed scopes.
#   - contents: read       → checkout repo + read vercel.json
#   - actions: read        → workflow_run trigger needs to read sibling
#                            workflow conclusions to gate on success
#                            (without it some runners say: "GitHub Actions
#                            is not permitted to access actions in this
#                            repository")
permissions:
  contents: read
  actions: read

# NOTE: GitHub Actions YAML 1.2 treats `on` as a normal string, but
# some YAML tools (yaml.safe_load in Python ≤1.1 mode, older SDK
# parsers) interpret `on` as boolean true. Quoting the key keeps the
# file portable across both. (Existing integration.yml has the same
# convention — keep them aligned.)
"on":
  # EMERGENCY LANE — see top-of-file header for trade-off.
  # Direct push to the protected `main` branch deploys to Vercel
  # production unconditionally. CI runs in parallel as a separate
  # workflow (integration.yml) but its conclusion does NOT gate this
  # deploy. The safety boundary is the git-server branch-protection
  # config (require signed commits + PR review), NOT this file.
  push:
    branches: [main]
  # Manual override. Useful when Vercel edge cache serves stale assets
  # and we need to re-deploy the last commit without pushing.
  workflow_dispatch:

# Cancel in-progress deploys so a fast follow-up push doesn't spawn
# duplicate runners re-uploading the same artifacts to Vercel. Group
# by ref so PR #X deploys don't cancel main deploys.
concurrency:
  group: deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  vercel:
    name: Deploy web/app to Vercel (production)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Either trigger event deploys unconditionally \u2014 there is no CI
    # gate in this workflow. See the file header for the safety model.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push'

    steps:
      # ─── 1. Checkout ─────────────────────────────────────────────
      # actions/checkout@v4 is the pinned major used by integration.yml.
      # Stay aligned so both workflows have identical checkout semantics.
      - uses: actions/checkout@v4

      # ─── 2. Deploy ───────────────────────────────────────────────
      # amondnet/vercel-action reads ./web/vercel.json and runs:
      #   install  →  npm ci
      #   build    →  npm run build  (tsc -b && vite build)
      #   upload   →  ./web/dist/ → Vercel production CDN
      #
      # We do NOT need a local Node setup step here — the Vercel action
      # sets up its own Node toolchain matching vercel.json's build image
      # (Node 24 currently), so adding `actions/setup-node` would only
      # pin to the GHA runner's version (20 by default) and risk a
      # version skew vs Vercel's own build image.
      - name: Deploy web/app to Vercel (production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          # `--prod` → promote the deployment to production alias.
          # Without it, the action would create an unscoped preview URL
          # which our DNS (instaedit.org → apex) does NOT point at.
          vercel-args: '--prod'
          # vercel.json (in ./web/) carries build/install/output config
          # (buildCommand: npm run build, installCommand: npm ci,
          # outputDirectory: dist). The action reads it automatically.
          working-directory: ./web
