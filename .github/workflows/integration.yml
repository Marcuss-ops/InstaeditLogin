name: integration

# Least-privilege: checkout + build + test don't need write or
# deploy scopes. The default GITHUB_TOKEN is broader.
permissions:
  contents: read

# Runs the integration tests against real ephemeral Postgres containers
# via testcontainers-go, covering both internal/database and
# internal/worker. Triggered on push/PR that touches test-shaping
# code or deps; Docker is pre-installed on ubuntu-runners.
on:
  push:
    branches: [main]
    paths:
      - 'internal/database/**/*.go'
      - 'internal/database/migrations/**'
      - 'internal/worker/**/*.go'
      - 'internal/models/**/*.go'
      - 'internal/testutil/**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/integration.yml'
  pull_request:
    branches: [main]
    paths:
      - 'internal/database/**/*.go'
      - 'internal/database/migrations/**'
      - 'internal/worker/**/*.go'
      - 'internal/models/**/*.go'
      - 'internal/testutil/**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/integration.yml'
  workflow_dispatch:

# Postgres image (currently postgres:17-alpine) is sourced from the
# testutil helper — bumping the version there is the single source
# of truth.

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Cancel in-progress runs in the same group so a fast follow-up
    # push doesn't spawn a duplicate runner re-pulling postgres:17-alpine.
    # Group by workflow + (PR number OR ref): on PR events `github.ref`
    # is `refs/pull/N/merge` and CHANGES per commit, so the PR number
    # is needed to keep consecutive PR pushes in the same group.
    concurrency:
      group: integration-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Drive the Go version from go.mod (currently 1.25.0) so a
          # future bump propagates here automatically. Avoids the prior
          # hardcode-drift bug (db-integration.yml had `1.23` while
          # go.mod was 1.25.0).
          go-version-file: go.mod
          cache: true

      - name: Verify build (sanity — no integration tag)
        run: go build ./...

      - name: Run database + worker integration tests (testcontainers postgres:17-alpine)
        # Delegates to the Makefile — single source of truth for the
        # test command. Edit `make test-integration`, not this step.
        run: make test-integration

      - name: Dump test summary on failure
        if: failure()
        run: |
          echo "=== Likely causes ==="
          echo "  - Docker not available on runner (impossible on ubuntu-latest)"
          echo "  - Migration added a new post_status enum value (must add to expectedPostStatusActive)"
          echo "  - Migration added a column Go model expects (must add to requiredColumns)"
          echo "  - Migration lost idempotency (a non-IF NOT EXISTS ALTER on re-run)"
          echo "  - Worker integration test hung — check the per-leaf 15s parallel-drain"
          echo "    ceiling in cmd/server/main.go"
          echo
          echo "Run locally:"
          echo "  make test-integration"
