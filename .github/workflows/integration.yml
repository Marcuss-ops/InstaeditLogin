name: integration

# Runs the integration tests against real ephemeral Postgres containers
# via testcontainers-go. Covers BOTH the database package (migrations +
# meta→Instagram rename tests) AND the worker package (PublishWorker +
# ReconcileWorker two-goroutine pipeline tests). Triggered on every
# push/PR that touches any test-shaping code, the shared testutil
# helper, the workflow file itself, or Go module files.
#
# Path-trigger strategy: explicit `paths` list keeps CI minutes focused
# on changes that could actually break integration behavior. Frontend-
# only, docs-only, and seed-only PRs don't need to pay for Docker.
on:
  push:
    branches: [main]
    paths:
      - 'internal/database/**/*.go'
      - 'internal/database/migrations/**'
      - 'internal/worker/**/*.go'
      - 'internal/models/**/*.go'
      - 'internal/testutil/**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/integration.yml'
  pull_request:
    branches: [main]
    paths:
      - 'internal/database/**/*.go'
      - 'internal/database/migrations/**'
      - 'internal/worker/**/*.go'
      - 'internal/models/**/*.go'
      - 'internal/testutil/**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/integration.yml'
  workflow_dispatch:

# GitHub-hosted ubuntu runners ship with Docker pre-installed —
# testcontainers just works without setup-docker. The Postgres image
# (currently postgres:17-alpine) is sourced from the testutil helper
# at internal/testutil/postgres/postgres.go — bumping the version
# there is the single source of truth.

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Drive the Go version from go.mod (currently 1.25.0) so a
          # future go.mod bump propagates to CI without touching this
          # file. Avoids the Go-pinning drift that the previous
          # db-integration.yml had (hardcoded `1.23` while go.mod was
          # 1.25.0).
          go-version-file: go.mod
          cache: true

      - name: Verify build (sanity — no integration tag)
        run: go build ./...

      - name: Run database + worker integration tests (testcontainers postgres:17-alpine)
        # Delegates to the Makefile target so the test command lives in
        # ONE place — the canonical command matches what a developer
        # runs locally (`make test-integration`). If the command
        # changes, edit the Makefile, not this workflow.
        run: make test-integration

      - name: Dump test summary on failure
        if: failure()
        run: |
          echo "=== Likely causes ==="
          echo "  - Docker not available on runner (impossible on ubuntu-latest)"
          echo "  - Migration added a new post_status enum value (must add to expectedPostStatusActive)"
          echo "  - Migration added a column Go model expects (must add to requiredColumns)"
          echo "  - Migration lost idempotency (a non-IF NOT EXISTS ALTER on re-run)"
          echo "  - Worker integration test hung — check the per-leaf 15s parallel-drain"
          echo "    ceiling in cmd/server/main.go"
          echo
          echo "Run locally:"
          echo "  make test-integration"
